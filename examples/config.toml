master_ratio = 0.55
border_px = 2
default_layout = "tile"
focus_follows_mouse = true

[colors]
focused   = "#88c0d0ff"
unfocused = "#3b4252ff"

[[bindings]]
keys   = "Super+Return"
action = "spawn"
arg    = "foot"

[[bindings]]
keys   = "Super+q"
action = "close"

[[bindings]]
keys   = "Super+Shift+e"
action = "quit"

[[bindings]]
keys   = "Super+j"
action = "focus_next"

[[bindings]]
keys   = "Super+k"
action = "focus_prev"

[[bindings]]
keys   = "Super+t"
action = "set_layout"
arg    = "tile"

[[bindings]]
keys   = "Super+g"
action = "set_layout"
arg    = "grid"

[[bindings]]
keys   = "Super+m"
action = "set_layout"
arg    = "monocle"

[[bindings]]
keys   = "Super+u"
action = "set_layout"
arg    = "float"

[[bindings]]
keys   = "Super+space"
action = "toggle_float"

[[bindings]]
keys   = "Super+r"
action = "reload"

[[bindings]]
keys   = "Super+f"
action = "toggle_fullscreen"

[[bindings]]
keys   = "Super+1"
